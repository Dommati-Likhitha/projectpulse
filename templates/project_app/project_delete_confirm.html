{% extends 'project_app/base.html' %}
{% block title %}Delete Project{% endblock %}
{% block content %}
<h2>Delete Project</h2>
<p>Are you sure you want to delete the project <strong>{{ project.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'project_detail' project.id %}">Cancel</a>
</form>
{% endblock %}
